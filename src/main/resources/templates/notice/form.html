<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴스 등록 - Verte</title>

    <link rel="icon" th:href="@{/images/favi.png}">
    <link rel="stylesheet" th:href="@{/css/reset.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/news.css}">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/4aff7483c9.js" crossorigin="anonymous"></script>
</head>
<body>
<div th:replace="~{fragments/header :: headerFragment}"></div>

<div class="max-w-[800px] mx-auto mt-[150px] mb-[100px] p-6">
    <div class="text-center mb-10">
        <h2 class="text-[40px] font-bold text-[#055C4D] mb-4">ETF 뉴스 등록</h2>
        <p class="text-gray-500">네이버 뉴스 링크를 입력하면 제목과 내용을 자동으로 가져옵니다.</p>
    </div>

    <div class="bg-white p-10 rounded-2xl shadow-[0_0_20px_rgba(0,0,0,0.05)] border border-gray-100">
        <div class="bg-gray-50 p-6 rounded-lg mb-8 text-sm text-gray-600 border-l-4 border-[#055C4D]">
            <h4 class="font-bold mb-2 text-gray-800"><i class="fa-regular fa-lightbulb text-[#055C4D] mr-2"></i>사용 방법</h4>
            <ul class="list-disc pl-5 space-y-1">
                <li>네이버 뉴스(경제, 증권) 기사의 <strong>URL 주소</strong>를 복사하세요.</li>
                <li>아래 입력창에 붙여넣고 등록 버튼을 누르세요.</li>
                <li>이미지와 본문 내용을 자동으로 크롤링하여 저장합니다.</li>
            </ul>
        </div>

        <form th:action="@{/notice/save}" method="post" class="space-y-6">
            <div>
                <label for="newsLink" class="block text-sm font-medium text-gray-700 mb-2">뉴스 기사 링크 (URL)</label>
                <input type="text" id="newsLink" name="newsLink" required
                       placeholder="https://n.news.naver.com/article/..."
                       class="w-full h-[55px] px-4 border border-gray-300 rounded-xl focus:outline-none focus:border-[#055C4D] focus:ring-1 focus:ring-[#055C4D] transition">
            </div>

            <div class="flex gap-4 pt-4">
                <a th:href="@{/notice}" class="flex-1 h-[55px] flex items-center justify-center border border-gray-300 rounded-xl text-gray-600 hover:bg-gray-50 transition font-medium">
                    취소
                </a>
                <button type="submit" class="flex-[2] h-[55px] bg-[#055C4D] text-white rounded-xl hover:bg-[#04463a] transition font-bold text-lg shadow-lg shadow-[#055C4D33]">
                    <i class="fa-solid fa-cloud-arrow-down mr-2"></i> 가져오기 및 등록
                </button>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footerFragment}"></div>

<script th:src="@{/js/common.js}"></script>
</body>
</html>
