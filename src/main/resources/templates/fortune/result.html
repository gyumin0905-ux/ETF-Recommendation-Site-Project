<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 투자 운세 결과</title>

    <link rel="stylesheet" th:href="@{/css/reset.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/fortune.css}">
    <link rel="icon" type="image/png" th:href="@{/images/favi.png}">

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<div th:replace="~{fragments/header :: headerFragment}"></div>

<div class="bg-layer">
    <div class="result-container">

        <div class="fortune-box">

            <div class="zodiac-img-wrap" th:switch="${result.zodiacSign}">
                <img th:case="'물병자리'" th:src="@{/images/aqua1.png}" class="fortune-zodiac-img">
                <img th:case="'물고기자리'" th:src="@{/images/pisces2.png}" class="fortune-zodiac-img">
                <img th:case="'양자리'" th:src="@{/images/aries3.png}" class="fortune-zodiac-img">
                <img th:case="'황소자리'" th:src="@{/images/tautus4.png}" class="fortune-zodiac-img">
                <img th:case="'쌍둥이자리'" th:src="@{/images/gemini5.png}" class="fortune-zodiac-img">
                <img th:case="'게자리'" th:src="@{/images/cancer6.png}" class="fortune-zodiac-img">
                <img th:case="'사자자리'" th:src="@{/images/leo7.png}" class="fortune-zodiac-img">
                <img th:case="'처녀자리'" th:src="@{/images/virgo8.png}" class="fortune-zodiac-img">
                <img th:case="'천칭자리'" th:src="@{/images/libra9.png}" class="fortune-zodiac-img">
                <img th:case="'전갈자리'" th:src="@{/images/scropius10.png}" class="fortune-zodiac-img">
                <img th:case="'사수자리'" th:src="@{/images/Sagittarius11.png}" class="fortune-zodiac-img">
                <img th:case="'염소자리'" th:src="@{/images/Capricornus12.png}" class="fortune-zodiac-img">
            </div>

            <h1 class="fortune-title" th:text="|✨ ${result.zodiacSign}의 오늘 운세|">물병자리의 운세</h1>

            <p class="fortune-content" th:text="${result.fortuneText}">
                운세 내용이 표시됩니다.
            </p>

            <div class="keyword-box">
                🔑 행운의 키워드: <span th:text="${result.keyword}">재물</span>
                &nbsp; → &nbsp; 추천 테마: <span th:text="${result.matchedTheme}">반도체</span>
            </div>
        </div>

        <h2 class="etf-list-title">🌌 행운을 불러오는 추천 ETF</h2>

        <div th:if="${result.recommendEtfs.isEmpty()}" style="text-align: center; color: #888; padding: 40px;">
            <p>오늘은 우주의 기운이 딱 맞는 ETF를 찾지 못했네요. <br> 잠시 후 다시 시도해보세요!</p>
        </div>

        <a th:each="etf : ${result.recommendEtfs}"
           th:href="@{/etf/{isin}(isin=${etf.isinCd})}"
           class="etf-card">

            <div class="etf-info">
                <h3 th:text="${etf.name}">ETF 종목명</h3>
                <div class="etf-tags">
                    <span>#<span th:text="${etf.theme}">테마</span></span> |
                    위험도 <span th:text="${etf.riskLevel}">2</span>등급
                </div>
            </div>
            <div class="arrow-icon">➜</div>
        </a>

        <div class="btn-group">
            <a th:href="@{/fortune}" class="sub-btn">↺ 다른 별자리 보기</a>
            <a th:href="@{/}" class="home-btn">메인으로 돌아가기</a>
        </div>

    </div>
</div>

<div th:replace="~{fragments/footer :: footerFragment}"></div>
<script th:src="@{/js/common.js}"></script>

</body>
</html>
