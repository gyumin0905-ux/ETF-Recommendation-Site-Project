<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ADMIN · 회원 정보 수정</title>

    <!-- UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/4aff7483c9.js" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            color: #1a1a1a;
        }

        .adminpage {
            min-height: 100vh;
            background: #f1f3f5;
        }

        .adminpage-wrap {
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .side-menu {
            width: 260px;
            background: #055c4d;
            padding: 40px 24px;
        }

        .side-menu .logo img {
            width: 100%;
        }

        .menu-list {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .menu-list a {
            color: #fff;
            opacity: .6;
            font-size: 18px;
        }

        .menu-list .userControl a,
        .menu-list a:hover {
            opacity: 1;
            font-weight: 700;
        }

        /* ===== CONTENT ===== */
        .content {
            flex: 1;
            padding: 40px 60px;
            max-width: 1660px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 42px;
            font-weight: 700;
            color: #055c4d;
            margin-bottom: 40px;
        }

        /* ===== FORM CARD ===== */
        .form-card {
            background:#fff;
            padding:50px 60px;
            border-radius:24px;
            box-shadow:3px 10px 20px #b8b3b3b3;
            max-width:900px;   /* ⭐ 이게 핵심 */
        }

        .form-row {
            display:flex;
            flex-direction:column;
            gap:8px;
            font-size:16px;
            font-weight:600;
            margin-bottom:28px;
        }

        .form-row input,
        .form-row select {
            height: 52px;
            border: 1px solid #b8b3b3;
            border-radius: 16px;
            padding: 0 20px;
            font-size: 15px;
        }

        /* ===== BUTTONS ===== */
        .btn-area {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 50px;
        }

        .btn-save {
            width: 200px;
            height: 48px;
            background: #467261;
            color: #fff;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
        }

        .btn-save:hover {
            background: #365a4c;
        }

        .btn-cancel {
            width: 200px;
            height: 48px;
            border: 2px solid #467261;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            line-height: 44px;
        }

        .btn-cancel:hover {
            background: #467261;
            color: #fff;
        }
    </style>
</head>

<body>
<section class="adminpage">
    <div class="adminpage-wrap">

        <!-- ===== SIDEBAR ===== -->
        <aside class="side-menu">
            <div class="logo">
                <a href="/"><img src="/images/logo-footer.png" alt="VERTE"/></a>
            </div>

            <ul class="menu-list">
                <li><a href="/admin">HOME</a></li>
                <li class="userControl"><a href="/admin/users">회원관리</a></li>
                <li><a href="/admin/etf">ETF 시세관리</a></li>
                <li><a href="/admin/meta">ETF 종목 관리</a></li>
                <li><a href="/admin/events">이벤트 관리</a></li>
            </ul>
        </aside>

        <!-- ===== CONTENT ===== -->
        <!-- ===== CONTENT ===== -->
        <section class="content">

            <!-- 🔹 Breadcrumb -->
            <nav class="text-sm text-gray-400 mb-6">
                <a href="/admin/users" class="hover:text-gray-700 font-medium">
                    회원관리
                </a>
                <span class="mx-2">></span>
                <span class="text-gray-800 font-semibold">
            회원 정보 수정
        </span>
            </nav>

            <h2 class="page-title mb-8">회원 정보 수정</h2>

            <form class="form-card"
                  th:action="@{/admin/users/edit}"
                  method="post">

                <input type="hidden" name="id" th:value="${user.id}"/>

                <!-- 🔹 1열 폼 -->
                <div class="space-y-8">

                    <div class="form-row">
                        아이디(닉네임)
                        <input type="text"
                               name="username"
                               th:value="${user.username}"
                               required/>
                    </div>

                    <div class="form-row">
                        이메일
                        <input type="email"
                               name="email"
                               th:value="${user.email}"
                               required/>
                    </div>

                    <div class="form-row">
                        회원유형
                        <select name="userRole"
                                th:disabled="${currentUser.id == user.id}">
                            <option value="USER"
                                    th:selected="${user.userRole=='USER'}">
                                회원
                            </option>
                            <option value="ADMIN"
                                    th:selected="${user.userRole=='ADMIN'}">
                                ADMIN
                            </option>
                        </select>
                    </div>

                    <div class="form-row">
                        투자 경험
                        <select name="experience">
                            <option value="beginner"
                                    th:selected="${user.experience=='beginner'}">
                                입문자
                            </option>
                            <option value="advanced"
                                    th:selected="${user.experience=='advanced'}">
                                숙련자
                            </option>
                        </select>
                    </div>

                    <div class="form-row">
                        관심 자산
                        <select name="asset">
                            <option value="stock"
                                    th:selected="${user.asset=='stock'}">
                                주식
                            </option>
                            <option value="etf"
                                    th:selected="${user.asset=='etf'}">
                                ETF
                            </option>
                            <option value="bonds"
                                    th:selected="${user.asset=='bonds'}">
                                채권
                            </option>
                            <option value="real_estate"
                                    th:selected="${user.asset=='real_estate'}">
                                부동산
                            </option>
                        </select>
                    </div>

                    <div class="form-row">
                        투자 목적
                        <select name="goal">
                            <option value="short_term"
                                    th:selected="${user.goal=='short_term'}">
                                단기
                            </option>
                            <option value="mid_term"
                                    th:selected="${user.goal=='mid_term'}">
                                중기
                            </option>
                            <option value="income"
                                    th:selected="${user.goal=='income'}">
                                인컴
                            </option>
                        </select>
                    </div>

                    <div class="form-row">
                        위험 성향
                        <select name="risk">
                            <option value="conservative"
                                    th:selected="${user.risk=='conservative'}">
                                보수
                            </option>
                            <option value="neutral"
                                    th:selected="${user.risk=='neutral'}">
                                중립
                            </option>
                            <option value="aggressive"
                                    th:selected="${user.risk=='aggressive'}">
                                공격
                            </option>
                        </select>
                    </div>

                    <div class="form-row">
                        지식 수준
                        <select name="knowledge">
                            <option value="basic"
                                    th:selected="${user.knowledge=='basic'}">
                                기초
                            </option>
                            <option value="advanced"
                                    th:selected="${user.knowledge=='advanced'}">
                                고급
                            </option>
                        </select>
                    </div>

                </div>

                <!-- 🔹 Buttons -->
                <div class="btn-area">
                    <button type="submit" class="btn-save">
                        저장하기
                    </button>
                    <a href="/admin/users" class="btn-cancel">
                        취소
                    </a>
                </div>

            </form>
        </section>
    </div>
</section>

<script>
    document.querySelector('.btn-save').addEventListener('click', (e) => {
        if (!confirm('저장하시겠습니까?')) {
            e.preventDefault();
        }
    });
</script>

</body>
</html>
