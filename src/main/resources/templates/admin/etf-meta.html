<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ADMIN · ETF 종목 관리</title>

    <!-- UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/4aff7483c9.js" crossorigin="anonymous"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            color: #1a1a1a;
        }

        .adminpage {
            width: 100%;
            min-height: 100vh;
        }

        .adminpage-wrap {
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .side-menu {
            width: 260px;
            background: #055c4d;
            padding: 40px 24px;
        }

        .side-menu .logo img {
            width: 100%;
        }

        .menu-list {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .menu-list a {
            color: #fff;
            opacity: .6;
            font-size: 18px;
        }

        .menu-list .productControl a,
        .menu-list a:hover {
            opacity: 1;
            font-weight: 700;
        }

        /* ===== CONTENT ===== */
        .tablesection {
            flex: 1;
            padding: 40px;
            background: #f1f3f5;
        }

        .title-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 48px;
            color: #055c4d;
            font-weight: 700;
        }

        .btn-add {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 18px;
            background: #40c057;
            color: #fff;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
        }

        .btn-add:hover {
            background: #37b24d;
        }

        /* ===== TABLE ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            border-top: 2px solid #c2c2c2;
            background: #fff;
        }

        th, td {
            height: 70px;
            border-bottom: 1px solid #ddd;
            text-align: center;
            font-size: 15px;
            padding: 0 12px;
        }

        th {
            background: #f9f9f9;
            font-weight: 700;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        /* ===== BUTTONS ===== */
        .btn-area {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .btn-edit {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: #228be6;
            color: white;
            font-size: 14px;
            border-radius: 6px;
        }

        .btn-edit:hover {
            background: #1c7ed6;
        }

        .btn-del {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: #fa5252;
            color: white;
            font-size: 14px;
            border-radius: 6px;
        }

        .btn-del:hover {
            background: #e03131;
        }
    </style>
</head>

<body>
<section class="adminpage">
    <div class="adminpage-wrap">

        <!-- ===== SIDEBAR ===== -->
        <aside class="side-menu">
            <div class="logo">
                <a href="/"><img src="/images/logo-footer.png" alt="VERTE"/></a>
            </div>

            <ul class="menu-list">
                <li><a href="/admin">HOME</a></li>
                <li><a href="/admin/users">회원관리</a></li>
                <li><a href="/admin/etf">ETF 시세관리</a></li>
                <li class="productControl"><a href="/admin/meta">ETF 종목 관리</a></li>
                <li><a href="/admin/events">이벤트 관리</a></li>
            </ul>
        </aside>

        <!-- ===== CONTENT ===== -->
        <section class="tablesection">

            <div class="title-wrap">
                <h2 class="page-title">ETF 종목 관리</h2>

                <a href="/admin/meta/edit" class="btn-add">
                    <i class="fa-solid fa-plus"></i>
                    신규 종목 등록
                </a>
            </div>

            <form method="get" action="/admin/meta"
                  class="bg-white rounded-xl p-5 mb-8 flex items-end gap-4">

                <!-- 키워드 -->
                <div class="flex flex-col">
                    <label class="text-sm mb-1 font-medium text-gray-600">
                        ID / 종목명
                    </label>
                    <input type="text"
                           name="keyword"
                           th:value="${keyword}"
                           placeholder="ETF ID · ISIN · 종목명"
                           class="border rounded-lg px-4 h-[42px] w-[220px]">
                </div>

                <!-- 테마 -->
                <div class="flex flex-col">
                    <label class="text-sm mb-1 font-medium text-gray-600">테마</label>
                    <select name="theme"
                            class="border rounded-lg px-3 h-[42px] w-[160px]">
                        <option value="">전체</option>
                        <option th:each="t : ${themes}"
                                th:value="${t}"
                                th:text="${t}"
                                th:selected="${t == theme}">
                        </option>
                    </select>
                </div>

                <!-- 위험등급 -->
                <div class="flex flex-col">
                    <label class="text-sm mb-1 font-medium text-gray-600">위험등급</label>
                    <select name="riskLevel"
                            class="border rounded-lg px-3 h-[42px] w-[120px]">
                        <option value="">전체</option>
                        <option th:each="i : ${#numbers.sequence(1,5)}"
                                th:value="${i}"
                                th:text="${i}"
                                th:selected="${i == riskLevel}">
                        </option>
                    </select>
                </div>

                <!-- 보수등급 -->
                <div class="flex flex-col">
                    <label class="text-sm mb-1 font-medium text-gray-600">보수등급</label>
                    <select name="expenseLevel"
                            class="border rounded-lg px-3 h-[42px] w-[120px]">
                        <option value="">전체</option>
                        <option value="low" th:selected="${expenseLevel == 'low'}">low</option>
                        <option value="mid" th:selected="${expenseLevel == 'mid'}">mid</option>
                        <option value="high" th:selected="${expenseLevel == 'high'}">high</option>
                    </select>
                </div>

                <!-- 검색 버튼 -->
                <button type="submit"
                        class="h-[42px] px-6 rounded-lg bg-[#055c4d] text-white font-semibold">
                    검색
                </button>

                <!-- 초기화 -->
                <a href="/admin/meta"
                   class="h-[42px] px-6 rounded-lg bg-gray-200 flex items-center font-medium">
                    초기화
                </a>

            </form>

            <table>
                <thead>
                <tr>
                    <th>ID(코드)</th>
                    <th>종목명</th>
                    <th>테마</th>
                    <th>자산유형</th>
                    <th>위험등급</th>
                    <th>보수등급</th>
                    <th>관리</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="m : ${etfMetas}">
                    <td th:text="${m.etfId}">KR...</td>
                    <td th:text="${m.name}" class="font-bold whitespace-nowrap">ETF NAME</td>
                    <td th:text="${m.theme}">THEME</td>
                    <td th:text="${m.assetType}">ETF</td>
                    <td th:text="${m.riskLevel}">3</td>
                    <td th:text="${m.expenseLevel}">mid</td>
                    <td>
                        <div class="btn-area">
                            <a th:href="@{/admin/meta/edit(id=${m.isinCd})}" class="btn-edit">
                                <i class="fa-solid fa-pen"></i> 수정
                            </a>

                            <a th:href="@{/admin/meta/delete(id=${m.isinCd})}"
                               onclick="return confirm('정말 삭제하시겠습니까?');"
                               class="btn-del">
                                <i class="fa-solid fa-trash"></i> 삭제
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="flex justify-center mt-8 gap-2">

                <!-- << 처음 -->
                <a th:if="${page.number > 0}"
                   th:href="@{/admin/meta(
           page=0,
           keyword=${keyword},
           theme=${theme},
           riskLevel=${riskLevel},
           expenseLevel=${expenseLevel}
       )}"
                   class="px-3 py-1 border rounded">
                    &laquo;
                </a>

                <!-- < 이전 블록 -->
                <a th:if="${page.number >= 10}"
                   th:href="@{/admin/meta(
           page=${page.number - 10},
           keyword=${keyword},
           theme=${theme},
           riskLevel=${riskLevel},
           expenseLevel=${expenseLevel}
       )}"
                   class="px-3 py-1 border rounded">
                    &lsaquo;
                </a>

                <!-- 🔥 페이지 번호 (1,2,3...) -->
                <a th:each="i : ${#numbers.sequence(
            (page.number / 10) * 10,
            T(java.lang.Math).min(((page.number / 10) * 10 + 9), page.totalPages - 1)
        )}"
                   th:href="@{/admin/meta(
           page=${i},
           keyword=${keyword},
           theme=${theme},
           riskLevel=${riskLevel},
           expenseLevel=${expenseLevel}
       )}"
                   th:text="${i + 1}"
                   th:classappend="${i == page.number} ? 'bg-[#055c4d] text-white' : ''"
                   class="px-3 py-1 border rounded">
                </a>

                <!-- > 다음 블록 -->
                <a th:if="${page.number + 10 < page.totalPages}"
                   th:href="@{/admin/meta(
           page=${page.number + 10},
           keyword=${keyword},
           theme=${theme},
           riskLevel=${riskLevel},
           expenseLevel=${expenseLevel}
       )}"
                   class="px-3 py-1 border rounded">
                    &rsaquo;
                </a>

                <!-- >> 마지막 -->
                <a th:if="${page.number < page.totalPages - 1}"
                   th:href="@{/admin/meta(
           page=${page.totalPages - 1},
           keyword=${keyword},
           theme=${theme},
           riskLevel=${riskLevel},
           expenseLevel=${expenseLevel}
       )}"
                   class="px-3 py-1 border rounded">
                    &raquo;
                </a>

            </div>
        </section>
    </div>
</section>
</body>
</html>
