<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ADMIN · ETF 시세 수정</title>

    <!-- UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/4aff7483c9.js" crossorigin="anonymous"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:'Noto Sans KR', sans-serif;
            color:#1a1a1a;
        }

        .adminpage { min-height:100vh; background:#f1f3f5; }
        .adminpage-wrap { display:flex; min-height:100vh; }

        /* ===== SIDEBAR ===== */
        .side-menu {
            width:260px;
            background:#055c4d;
            padding:40px 24px;
        }

        .side-menu .logo img { width:100%; }

        .menu-list {
            margin-top:40px;
            display:flex;
            flex-direction:column;
            gap:24px;
        }

        .menu-list a {
            color:#fff;
            opacity:.6;
            font-size:18px;
        }

        .menu-list .etfControl a,
        .menu-list a:hover {
            opacity:1;
            font-weight:700;
        }

        /* ===== CONTENT ===== */
        .content {
            flex:1;
            padding:40px 60px;
            max-width:1660px;
            margin:0 auto;
        }

        .page-title {
            font-size:42px;
            font-weight:700;
            color:#055c4d;
            margin-bottom:40px;
        }

        /* ===== FORM CARD ===== */
        .form-card {
            background:#fff;
            padding:50px 60px;
            border-radius:24px;
            box-shadow:3px 10px 20px #b8b3b3b3;
            max-width:900px;
        }

        .form-row {
            display:flex;
            flex-direction:column;
            gap:8px;
            font-size:16px;
            font-weight:600;
            margin-bottom:28px;
        }

        .form-row input {
            height:52px;
            border:1px solid #b8b3b3;
            border-radius:16px;
            padding:0 20px;
            font-size:15px;
        }

        input[readonly] {
            background:#e9ecef;
            color:#868e96;
            cursor:not-allowed;
        }

        /* ===== BUTTONS ===== */
        .btn-area {
            display:flex;
            justify-content:center;
            gap:24px;
            margin-top:40px;
        }

        .btn-save {
            width:200px;
            height:48px;
            background:#467261;
            color:#fff;
            border-radius:12px;
            font-size:15px;
            font-weight:600;
        }

        .btn-save:hover { background:#365a4c; }

        .btn-cancel {
            width:200px;
            height:48px;
            border:2px solid #467261;
            border-radius:12px;
            font-size:15px;
            font-weight:600;
            text-align:center;
            line-height:44px;
        }

        .btn-cancel:hover {
            background:#467261;
            color:#fff;
        }
    </style>
</head>

<body>
<section class="adminpage">
    <div class="adminpage-wrap">

        <!-- ===== SIDEBAR ===== -->
        <aside class="side-menu">
            <div class="logo">
                <a href="/admin">
                    <img src="/images/logo-footer.png" alt="VERTE ADMIN">
                </a>
            </div>

            <ul class="menu-list">
                <li><a href="/admin">HOME</a></li>
                <li><a href="/admin/users">회원관리</a></li>
                <li class="etfControl"><a href="/admin/etf">ETF 시세관리</a></li>
                <li><a href="/admin/meta">ETF 종목 관리</a></li>
                <li><a href="/admin/events">이벤트 관리</a></li>
            </ul>
        </aside>

        <!-- ===== CONTENT ===== -->
        <section class="content">

            <!-- 🔹 Breadcrumb -->
            <nav class="text-sm text-gray-400 mb-6">
                <a href="/admin/etf" class="hover:text-gray-700 font-medium">
                    ETF 시세관리
                </a>
                <span class="mx-2">></span>
                <span class="text-gray-800 font-semibold">
                    ETF 시세 수정
                </span>
            </nav>

            <h2 class="page-title">ETF 시세 수정</h2>

            <form class="form-card"
                  th:action="@{/admin/etf/save}"
                  method="post">

                <!-- 🔹 PK (readonly) -->
                <div class="form-row">
                    기준일자 (BAS_DT)
                    <input type="text"
                           name="basDt"
                           th:value="${etf.basDt}"
                           readonly>
                </div>

                <div class="form-row">
                    종목코드 (ISIN_CD)
                    <input type="text"
                           name="isinCd"
                           th:value="${etf.isinCd}"
                           readonly>
                </div>

                <!-- 🔹 Editable -->
                <div class="form-row">
                    종가 (CLPR)
                    <input type="number"
                           name="clpr"
                           th:value="${etf.clpr}"
                           required>
                </div>

                <div class="form-row">
                    등락률 (FLUC_RT)
                    <input type="text"
                           name="flucRt"
                           th:value="${etf.flucRt}"
                           placeholder="예: 1.23">
                </div>

                <div class="form-row">
                    거래량 (TR_QUANT)
                    <input type="number"
                           name="trQuant"
                           th:value="${etf.trQuant}">
                </div>

                <!-- 🔹 Buttons -->
                <div class="btn-area">
                    <button type="submit" class="btn-save">
                        수정하기
                    </button>
                    <a href="/admin/etf" class="btn-cancel">
                        취소
                    </a>
                </div>

            </form>
        </section>
    </div>
</section>

<script>
    document.querySelector('.btn-save').addEventListener('click', (e) => {
        if (!confirm('저장하시겠습니까?')) {
            e.preventDefault();
        }
    });
</script>

</body>
</html>
