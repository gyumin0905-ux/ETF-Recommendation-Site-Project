<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ADMIN · 회원관리</title>

    <!-- UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/4aff7483c9.js" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            color: #1a1a1a;
        }

        .adminpage {
            width: 100%;
            min-height: 100vh;
        }

        .adminpage-wrap {
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .side-menu {
            width: 260px;
            background: #055c4d;
            padding: 40px 24px;
        }

        .side-menu .logo img {
            width: 100%;
        }

        .menu-list {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .menu-list a {
            color: #fff;
            opacity: .6;
            font-size: 18px;
        }

        .menu-list .userControl a,
        .menu-list a:hover {
            opacity: 1;
            font-weight: 700;
        }

        /* ===== CONTENT ===== */
        .tablesection {
            flex: 1;
            padding: 40px;
            background: #f1f3f5;
        }

        .title-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 48px;
            color: #055c4d;
            font-weight: 700;
        }

        /* ===== TABLE ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            border-top: 2px solid #c2c2c2;
            background: #fff;
        }

        th, td {
            height: 70px;
            border-bottom: 1px solid #ddd;
            text-align: center;
            font-size: 15px;
            padding: 0 12px;
        }

        th {
            background: #f9f9f9;
            font-weight: 700;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        /* ===== BUTTONS ===== */
        .btn-area {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .btn-edit {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: #228be6;
            color: white;
            font-size: 14px;
            border-radius: 6px;
        }

        .btn-edit:hover {
            background: #1c7ed6;
        }

        .btn-del {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: #fa5252;
            color: white;
            font-size: 14px;
            border-radius: 6px;
        }

        .btn-del:hover {
            background: #e03131;
        }
    </style>
</head>

<body>
<section class="adminpage">
    <div class="adminpage-wrap">

        <!-- ===== SIDEBAR ===== -->
        <aside class="side-menu">
            <div class="logo">
                <a href="/"><img src="/images/logo-footer.png" alt="VERTE"/></a>
            </div>

            <ul class="menu-list">
                <li><a href="/admin">HOME</a></li>
                <li class="userControl"><a href="/admin/users">회원관리</a></li>
                <li><a href="/admin/etf">ETF 시세관리</a></li>
                <li><a href="/admin/meta">ETF 종목 관리</a></li>
                <li><a href="/admin/events">이벤트 관리</a></li>
            </ul>
        </aside>

        <!-- ===== CONTENT ===== -->
        <section class="tablesection">

            <div class="title-wrap">
                <h2 class="page-title">회원관리</h2>
            </div>

            <form method="get" action="/admin/users"
                  class="bg-white rounded-xl p-5 mb-8 flex items-end gap-4">

                <!-- 키워드 -->
                <div class="flex flex-col">
                    <label class="text-sm mb-1 font-medium text-gray-600">
                        ID / 아이디 / 이메일
                    </label>
                    <input type="text"
                           name="keyword"
                           th:value="${keyword}"
                           placeholder="검색어 입력"
                           class="border rounded-lg px-4 h-[42px] w-[220px]">
                </div>

                <!-- 회원유형 -->
                <div class="flex flex-col">
                    <label class="text-sm mb-1 font-medium text-gray-600">회원유형</label>
                    <select name="role"
                            class="border rounded-lg px-3 h-[42px] w-[140px]">
                        <option value="">전체</option>
                        <option value="USER" th:selected="${role == 'USER'}">USER</option>
                        <option value="ADMIN" th:selected="${role == 'ADMIN'}">ADMIN</option>
                    </select>
                </div>

                <!-- 위험성향 -->
                <div class="flex flex-col">
                    <label class="text-sm mb-1 font-medium text-gray-600">위험성향</label>
                    <select name="risk"
                            class="border rounded-lg px-3 h-[42px] w-[140px]">
                        <option value="">전체</option>
                        <option value="conservative" th:selected="${risk=='conservative'}">보수</option>
                        <option value="neutral" th:selected="${risk=='neutral'}">중립</option>
                        <option value="aggressive" th:selected="${risk=='aggressive'}">공격</option>
                    </select>
                </div>

                <button type="submit"
                        class="h-[42px] px-6 rounded-lg bg-[#055c4d] text-white font-semibold">
                    검색
                </button>

                <a href="/admin/users"
                   class="h-[42px] px-6 rounded-lg bg-gray-200 flex items-center font-medium">
                    초기화
                </a>
            </form>

            <table>
                <thead>
                <tr>
                    <th>NO</th>
                    <th>아이디</th>
                    <th>이메일</th>
                    <th>회원유형</th>
                    <th>위험성향</th>
                    <th>가입일</th>
                    <th>관리</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.username}" class="font-bold"></td>
                    <td th:text="${u.email}"></td>

                    <td>
                        <span th:if="${u.isAdmin()}"
                              class="inline-block px-3 py-1 text-sm rounded-full bg-red-100 text-red-600 font-semibold">
                            ADMIN
                        </span>
                        <span th:unless="${u.isAdmin()}"
                              class="inline-block px-3 py-1 text-sm rounded-full bg-blue-100 text-blue-600 font-semibold">
                            회원
                        </span>
                    </td>

                    <td>
                        <span class="inline-block px-3 py-1 text-sm rounded-full bg-gray-100 text-gray-700 font-medium"
                              th:text="${u.risk}">
                        </span>
                    </td>

                    <td th:text="${#temporals.format(u.createdAt,'yyyy-MM-dd')}"></td>

                    <td>
                        <div th:if="${currentUser.id != u.id}" class="btn-area">
                            <a th:href="@{/admin/users/edit(id=${u.id})}" class="btn-edit">
                                <i class="fa-solid fa-pen"></i> 수정
                            </a>

                            <form th:action="@{/admin/users/delete}" method="post">
                                <input type="hidden" name="id" th:value="${u.id}">
                                <button type="submit"
                                        onclick="return confirm('정말 삭제하시겠습니까?');"
                                        class="btn-del">
                                    <i class="fa-solid fa-trash"></i> 탈퇴
                                </button>
                            </form>
                        </div>

                        <span th:if="${currentUser.id == u.id}" class="text-gray-400 text-sm">
                            (본인)
                        </span>
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="flex justify-center mt-10 gap-2">

                <a th:if="${page.number > 0}"
                   th:href="@{/admin/users(page=0, keyword=${keyword}, role=${role}, risk=${risk})}"
                   class="px-3 py-1 border rounded">&laquo;</a>

                <a th:each="i : ${#numbers.sequence(
        (page.number / 10) * 10,
        T(java.lang.Math).min(((page.number / 10) * 10 + 9), page.totalPages - 1)
    )}"
                   th:href="@{/admin/users(page=${i}, keyword=${keyword}, role=${role}, risk=${risk})}"
                   th:text="${i + 1}"
                   th:classappend="${i == page.number} ? 'bg-[#055c4d] text-white' : ''"
                   class="px-3 py-1 border rounded">
                </a>

                <a th:if="${page.number + 10 < page.totalPages}"
                   th:href="@{/admin/users(page=${page.number + 10}, keyword=${keyword}, role=${role}, risk=${risk})}"
                   class="px-3 py-1 border rounded">&rsaquo;</a>

                <a th:if="${page.number < page.totalPages - 1}"
                   th:href="@{/admin/users(page=${page.totalPages - 1}, keyword=${keyword}, role=${role}, risk=${risk})}"
                   class="px-3 py-1 border rounded">&raquo;</a>
            </div>

        </section>
    </div>
</section>
</body>
</html>
