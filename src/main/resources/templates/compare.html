<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <title>ETF 비교·랭킹</title>
    <link rel="icon" th:href="@{/images/favi.png}">

    <link rel="stylesheet" th:href="@{/css/reset.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/compare.css}">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header th:replace="~{fragments/header :: headerFragment}"></header>

<section>
    <div class="section1Wrap">
        <h1>상품비교</h1>
        <p>ETF를 선택하여 상품을 비교해보세요.</p>

        <div class="comparecontent">
            <div class="boxA">
                <p class="boxintxt">아래에서 상품을 선택해주세요.</p>
            </div>

            <img class="vs" th:src="@{/images/vs1.png}" alt="VS">

            <div class="boxB">
                <p class="boxintxt">아래에서 상품을 선택해주세요.</p>
            </div>
        </div>

        <button class="compareBtn is-disabled">비교하기</button>
    </div>

    <div class="resultBox">
        <div class="result1">
            <h3>주가비교차트(1년)</h3>
            <div class="resultChart">
                <canvas id="resultCompareChart"></canvas>
            </div>
        </div>

        <div class="result2">
            <ul class="tab-view">
                <li>
                    <div id="compareResultArea">비교 결과가 여기에 표시됩니다.</div>
                </li>
            </ul>
        </div>
    </div>

    <div class="compareList">
        <h3>ETF상품 TOP10</h3>

        <div class="top10content">
            <ul class="top5">
                <li th:each="etf, st : ${etfs}" th:if="${st.index < 5}" th:attr="data-isin=${etf.isinCd}">
                    <span class="rankin" th:text="${st.index + 1} + '위'"></span>
                    <span class="prutit" th:text="${etf.name}"></span>
                    <span class="code" th:text="${etf.isinCd}"></span>
                </li>
            </ul>
            <ul class="top10">
                <li th:each="etf, st : ${etfs}" th:if="${st.index >= 5 and st.index < 10}" th:attr="data-isin=${etf.isinCd}">
                    <span class="rankin" th:text="${st.index + 1} + '위'"></span>
                    <span class="prutit" th:text="${etf.name}"></span>
                    <span class="code" th:text="${etf.isinCd}"></span>
                </li>
            </ul>
        </div>
    </div>

    <div id="RecommendWrap">
        <div class="title">
            <h1>오늘의 추천 비교</h1>
        </div>

        <div class="section2Wrap">
            <div class="leftVS">
                <div class="chart-left">
                    <canvas id="compareReturnChart"></canvas>
                </div>

                <table class="inform1">
                    <tr><th>상품명</th><td id="leftName">-</td><td id="rightName">-</td></tr>
                    <tr><th>테마</th><td id="leftTheme">-</td><td id="rightTheme">-</td></tr>
                    <tr><th>위험도</th><td id="leftRisk">-</td><td id="rightRisk">-</td></tr>
                    <tr><th>ISIN</th><td id="leftIsin">-</td><td id="rightIsin">-</td></tr>
                </table>
            </div>

            <div class="rightList">
                <ul class="proList">
                    <li th:each="pair, st : ${randomTop5}"
                        th:classappend="${st.index == 0} ? 'on' : ''"
                        th:attr="
                        data-left-name=${pair.left.name},
                        data-left-theme=${pair.left.theme},
                        data-left-risk=${pair.left.riskLevel},
                        data-left-isin=${pair.left.isinCd},
                        data-right-name=${pair.right.name},
                        data-right-theme=${pair.right.theme},
                        data-right-risk=${pair.right.riskLevel},
                        data-right-isin=${pair.right.isinCd}
                    ">
                        <span class="number" th:text="${st.index + 1} + '.'">1.</span>

                        <div class="vs-container">
                            <div class="vs-item">
                                <em th:text="${pair.left.isinCd}"></em>
                                <span class="maintxt" th:text="${pair.left.name}"></span>
                            </div>
                            <span class="vs-center">VS</span>
                            <div class="vs-item">
                                <em th:text="${pair.right.isinCd}"></em>
                                <span class="maintxt" th:text="${pair.right.name}"></span>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footerFragment}"></footer>

<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/compare.js}"></script>

<script>
    const __charts = {};

    function loadReturnChartInto(canvasId, isin1, isin2, period = "1Y", type = "line") {
        $.getJSON("/compare/chart/return", { isin1, isin2, period }, function (res) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext("2d");

            if (__charts[canvasId]) {
                __charts[canvasId].destroy();
                __charts[canvasId] = null;
            }

            // ✅ undefined 방어
            const leftLabel  = res.left.label  || res.left.name  || isin1;
            const rightLabel = res.right.label || res.right.name || isin2;

            __charts[canvasId] = new Chart(ctx, {
                type: type,
                data: {
                    labels: res.labels,
                    datasets: [
                        { label: res.left.label, data: res.left.data, borderColor: "#2563eb", backgroundColor: "#2563eb", borderWidth: 2, tension: 0.3, pointRadius: 0 },
                        { label: res.right.label, data: res.right.data, borderColor: "#e11d48", backgroundColor: "#e11d48", borderWidth: 2, tension: 0.3, pointRadius: 0 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: "index", intersect: false },
                    scales: { y: { ticks: { callback: v => v + "%" } } }
                }
            });
        });
    }
</script>

</body>
</html>
