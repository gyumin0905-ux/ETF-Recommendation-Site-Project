<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${board.title}">게시글 상세</title>

    <link rel="stylesheet" th:href="@{/css/reset.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* ===== 게시글 상세 전용 스타일 ===== */
        .freeboardDetail{
            width:1520px;
            border:1px solid #1d7a5548;
            border-radius:30px;
            margin:170px auto 70px;
            background:#fff;
        }

        .freeboardTitle{
            padding:30px;
            border-bottom:1px solid #1d7a5548;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .freeboardTitle h3{
            font-size:26px;
            font-weight:600;
        }

        .likeBtn{
            border:2px solid #e64980;
            color:#e64980;
            padding:8px 18px;
            border-radius:30px;
        }

        .freeboardContent{padding:30px;}

        .metaRow{
            display:flex;
            justify-content:space-between;
            margin-bottom:20px;
            font-size:14px;
            color:#777;
        }

        .metaRight{text-align:right;}

        .ownerActions{
            margin-top:6px;
            display:flex;
            justify-content:flex-end;
            gap:6px;
        }

        .contentText{
            font-size:16px;
            line-height:1.8;
            white-space:pre-line;
        }

        /* ================= 댓글 ================= */
        .commentWrap{
            width:1520px;
            margin:80px auto;
            border:1px solid #1d7a5548;
            border-radius:30px;
            padding:30px;
            background:#fff;
        }

        .commentTitle{
            text-align:center;
            font-size:20px;
            font-weight:600;
            margin-bottom:30px;
        }

        .commentGrid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:30px;
        }

        .commentList{
            max-height:420px;
            overflow-y:auto;
            padding-right:10px;
        }

        .commentItem{
            border:1px solid #ddd;
            border-radius:18px;
            padding:16px;
            margin-bottom:14px;
        }

        .commentUser{
            font-weight:600;
            margin-bottom:6px;
        }

        .commentContent{
            font-size:14px;
            line-height:1.6;
        }

        .commentForm{
            border:1px solid #ddd;
            border-radius:20px;
            padding:20px;
            display:flex;
            flex-direction:column;
            gap:10px;
        }

        .commentForm textarea{
            width:100%;
            height:220px;
            border-radius:15px;
            border:1px solid #ccc;
            padding:15px;
            resize:none;
            font-size:14px;
        }

        .commentForm .submitRow{
            text-align:right;
        }

        /* ================= 최근 게시글 ================= */
        .recentBoard{
            width:1520px;
            margin:80px auto;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            padding:14px;
            border-bottom:1px solid #eee;
            text-align:center;
        }

        td.title{text-align:left;}
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: headerFragment}"></div>

<div class="wrap" style="position: relative; z-index: 1;">
    <section class="freeboardDetail">
        <div class="freeboardTitle">
            <h3 th:text="${board.title}">제목</h3>

            <form th:action="@{/board/{id}/like(id=${board.id})}" method="post">
                <button class="likeBtn">
                    <span th:if="${isLiked}">♥</span>
                    <span th:unless="${isLiked}">♡</span>
                    좋아요 <span th:text="${board.likes.size()}">0</span>
                </button>
            </form>
        </div>

        <div class="freeboardContent">
            <div class="metaRow">
                <div>작성자 : <b th:text="${board.user.username}"></b></div>

                <div class="metaRight">
                    <div th:text="${#temporals.format(board.createdDate,'yyyy-MM-dd')}"></div>

                    <div class="ownerActions" th:if="${isOwner}">
                        <a th:href="@{/board/{id}/edit(id=${board.id})}"
                           class="btn btn-xs btn-outline">수정</a>

                        <form th:action="@{/board/{id}/delete(id=${board.id})}"
                              method="post"
                              onsubmit="return confirm('삭제하시겠습니까?');">
                            <button class="btn btn-xs btn-outline btn-error">삭제</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="contentText" th:text="${board.content}"></div>
        </div>
    </section>

    <section class="commentWrap">
        <div class="commentTitle">댓글창</div>

        <div class="commentGrid">
            <div class="commentList">
                <div th:each="comment : ${comments}" class="commentItem">
                    <div class="commentUser" th:text="${comment.user.username}"></div>
                    <div class="commentContent" th:text="${comment.content}"></div>
                </div>
            </div>

            <form class="commentForm"
                  th:action="@{/board/{id}/comment(id=${board.id})}"
                  method="post">
                <textarea name="content"
                          placeholder="댓글을 자유롭게 작성해주세요"
                          required></textarea>

                <div class="submitRow">
                    <button class="btn btn-outline btn-sm">POST</button>
                </div>
            </form>
        </div>
    </section>

    <section class="recentBoard">
        <h3 class="text-xl mb-4">최근 게시글</h3>

        <table>
            <thead>
            <tr>
                <th>제목</th>
                <th>조회수</th>
                <th>등록일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="b : ${recentBoards}">
                <td class="title">
                    <a th:href="@{/board/{id}(id=${b.id})}"
                       th:text="${b.title}"></a>
                </td>
                <td th:text="${b.views}">0</td>
                <td th:text="${#temporals.format(b.createdDate,'yyyy-MM-dd')}"></td>
            </tr>
            </tbody>
        </table>
    </section>
</div>

<div th:replace="~{fragments/footer :: footerFragment}"></div>

<script th:src="@{/js/common.js}"></script>
</body>
</html>
